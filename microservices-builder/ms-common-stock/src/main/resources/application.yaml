spring:
  application:
    name: ms-common-stock
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_common_stock
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    table: flyway_migration_ms_common_stock
---
server:
  port: 8082
---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    displayRequestDuration: true
    doc-expansion: list
    defaultModelExpandDepth: 2
    displayOperationId: false
    try-it-out-enabled: true
---
spring:
  config:
    activate:
      on-profile: test-data
---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8083/eureka

