spring:
  application:
    name: ms-common-stock
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_common_stock
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    table: flyway_migration_ms_common_stock
server:
  port: 8082

---
spring:
  config:
    activate:
      on-profile: test-data
