spring:
  application:
    name: ms-common-stock
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_common_stock
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    table: flyway_migration_ms_common_stock
---
server:
  port: 8082
---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    displayRequestDuration: true
    doc-expansion: list
    defaultModelExpandDepth: 2
    displayOperationId: false
    try-it-out-enabled: true
---
spring:
  config:
    activate:
      on-profile: test-data
---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8083/eureka
---
# Trazas → Zipkin: Micrometer Tracing + Brave (micrometer-tracing-bridge-brave, zipkin-reporter-brave, Actuator).
# Endpoint: management.zipkin.tracing.endpoint; variable ZIPKIN_ENDPOINT (URL completa …/api/v2/spans).
# Zipkin en Docker en el host: -p 9411:9411 → por defecto localhost. En Compose misma red: ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
# Muestreo: TRACING_SAMPLE_PROBABILITY (0.0–1.0). Guía: README del repositorio («Trazas distribuidas y Zipkin»).
management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
