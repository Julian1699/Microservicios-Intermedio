spring:
  application:
    name: ms-discovery-server
  # Protege el dashboard Eureka con HTTP Basic (usuario en memoria).
  # Los clientes deben usar: http://<user>:<password>@localhost:8083/eureka
  security:
    user:
      name: eureka
      password: password
server:
  port: 8083
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
