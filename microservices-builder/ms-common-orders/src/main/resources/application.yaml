spring:
  application:
    name: ms-common-orders
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_common_orders
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
server:
  port: 8081
# Cliente HTTP hacia ms-common-stock (inventario)
stock:
  service:
    base-url: http://localhost:8082
    timeout-ms: 10000
logging:
  level:
    com.orders.service.OrderService: INFO
