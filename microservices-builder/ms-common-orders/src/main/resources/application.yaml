spring:
  application:
    name: ms-common-orders
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_common_orders
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
---
server:
  port: 8081
---
# Integración HTTP con ms-common-stock (WebClientConfig + StockWebClient leen estas claves)
stock:
  service:
    base-url: http://localhost:8082
    timeout-ms: 10000
    paths:
      codes: /api/stock/codes
      deduct: /api/stock/deduct
      restore: /api/stock/restore
---
# OpenAPI / Swagger UI (SpringDoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    displayRequestDuration: true
    doc-expansion: list
    defaultModelExpandDepth: 2
    displayOperationId: false
    try-it-out-enabled: true
---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8083/eureka
