spring:
  application:
    name: ms-common-orders
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_common_orders
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
---
# port: ${SERVER_PORT:0} == 0 = puerto libre aleatorio (varias instancias en local). Override: -Dserver.port=8081 o variable SERVER_PORT
server:
  port: 8081
---
# Integración HTTP con ms-common-stock (WebClientConfig + StockWebClient leen estas claves)
stock:
  service:
    base-url: http://localhost:8082
    timeout-ms: 10000
    paths:
      codes: /api/stock/query/codes
      deduct: /api/stock/deduct
      restore: /api/stock/restore
---
# OpenAPI / Swagger UI (SpringDoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    displayRequestDuration: true
    doc-expansion: list
    defaultModelExpandDepth: 2
    displayOperationId: false
    try-it-out-enabled: true
---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8083/eureka
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
---
# Trazas → Zipkin: Micrometer Tracing + Brave (micrometer-tracing-bridge-brave, zipkin-reporter-brave, Actuator).
# Endpoint: management.zipkin.tracing.endpoint; variable ZIPKIN_ENDPOINT (URL completa …/api/v2/spans).
# Zipkin en Docker en el host: -p 9411:9411 → por defecto localhost. En Compose misma red: ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans
# Muestreo: TRACING_SAMPLE_PROBABILITY (0.0–1.0). Guía: README del repositorio («Trazas distribuidas y Zipkin»).
# Llamadas WebClient a stock: spans salientes «webclient <método> <ruta>» (DescriptiveClientRequestObservationConvention + WebClientConfig).
management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
