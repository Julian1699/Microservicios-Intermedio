version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongo-db-local
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: admin
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - local-mongo-network

volumes:
  mongo_data:

networks:
  local-mongo-network:
    name: local-mongo-network
